<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dịch Giọng Nam Kì</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Mulish:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8932A;
    --gold-light: #E8B84B;
    --dark: #24180B;
    --dark2: #2A1F0A;
    --cream: #fff4dc;
    --cream2: #EDE0C4;
    --red: #8B2020;
    --text: #3D2B0A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Mulish', sans-serif;
    min-height: auto;
    color: var(--cream);
    overflow-x: hidden;
  }

  .bg-pattern {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(200,147,42,0.03) 40px, rgba(200,147,42,0.03) 41px),
      repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(200,147,42,0.03) 40px, rgba(200,147,42,0.03) 41px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0.8rem 0.9rem 1.2rem;
  }

  header {
     text-align: center;
    padding: 0.6rem 0 0.7rem;
    border-bottom: 1px solid rgba(220,180,80,0.35);
    margin-bottom: 1.2rem;
  }

  .logo-band {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 0.5rem;
  }

  .logo-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .logo-line.right {
    background: linear-gradient(to left, transparent, var(--gold));
  }

  .diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  h1 span {
    display: block;
    font-size: 0.45em;
    color: var(--cream2);
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.3rem;
    font-family: 'Mulish', sans-serif;
  }

  .tagline {
    font-size: 13px;
    color: rgba(245,237,216,0.5);
    letter-spacing: 0.1em;
    margin-top: 0.75rem;
    text-transform: uppercase;
  }

  .panel {
    background: rgba(60,45,18,0.28);
    border: 1px solid rgba(255,220,120,0.08);
    border-radius: 10px;
    padding: 0.8rem;
    margin-bottom: 0.45rem;
    backdrop-filter: blur(6px);
  }

  .panel-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,147,42,0.2);
  }

  textarea {
    width: 100%;
    background: rgba(26,18,8,0.6);
    border: 1px solid rgba(200,147,42,0.2);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'Mulish', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 1rem;
    resize: vertical;
    min-height: 200px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: rgba(200,147,42,0.5);
  }

  textarea::placeholder {
    color: rgba(245,237,216,0.25);
    font-style: italic;
  }

  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .mode-btn {
    padding: 6px 16px;
    border: 1px solid rgba(200,147,42,0.3);
    border-radius: 2px;
    background: transparent;
    color: rgba(245,237,216,0.5);
    font-family: 'Mulish', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .mode-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 700;
  }

  .go-btn {
    margin-top: 12px;
    padding: 0.55rem 1rem;
    background: #d8ab46;
    border: none;
    border-radius: 8px;
    color: #2b1d0d;
    font-family: 'Playfair Display', serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    min-width: 110px;
}

.go-btn:hover {
    transform: translateY(-1px);
    background: #e0b654;
  }

  .go-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .go-btn .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(26,18,8,0.3);
    border-top-color: var(--dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-box {
    background: rgba(26,18,8,0.6);
    border: 1px solid rgba(200,147,42,0.2);
    border-radius: 3px;
    padding: 1.25rem;
    font-size: 17px;
    line-height: 1.95;
    color: var(--cream);
    min-height: 200px;
    white-space: pre-wrap;
    position: relative;
  }

  .result-box.empty {
    color: rgba(245,237,216,0.2);
    font-style: italic;
    font-size: 13px;
  }

  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(200,147,42,0.15);
    border: 1px solid rgba(200,147,42,0.3);
    border-radius: 2px;
    color: var(--gold);
    font-family: 'Mulish', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .copy-btn:hover { background: rgba(200,147,42,0.3); }
  .copy-btn.show { display: block; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: rgba(245,237,216,0.2);
    letter-spacing: 0.1em;
    margin-top: 2rem;
    text-transform: uppercase;
  }

  .error-msg {
    background: rgba(139,32,32,0.3);
    border: 1px solid rgba(139,32,32,0.5);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: #ffaaaa;
    margin-top: 0.75rem;
    display: none;
  }

  .word-count {
    font-size: 11px;
    color: rgba(245,237,216,0.3);
    text-align: right;
    margin-top: 4px;
  }
.subtitle {
    text-align: center;
    color: #ffe7b0;
    font-size: 13px;
    letter-spacing: 5px;
    opacity: 0.9;
    margin-top: 10px;
    margin-bottom: 38px;
}</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="container">

  <header>
    <div class="logo-band">
      <div class="logo-line"></div>
      <div class="diamond"></div>
      <div class="logo-line right"></div>
    </div>
    <h1>
  Nami
  <span>Tiếng của người Nam</span>
</h1>

<p class="subtitle">
  SPEAK SOUTHERN
</p>  </header>

  <div class="panel">
    <div class="panel-label">Chọn kiểu dịch</div>
    <div class="mode-row">
      <button class="mode-btn active" data-mode="en-vi">Anh — Nam</button>
      <button class="mode-btn" data-mode="bac-nam">Bắc — Nam</button>
      <button class="mode-btn" data-mode="script">Biên Soạn YouTube</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Nguyên văn — Source</div>
    <textarea id="input" placeholder="Biên chữ vô đây — Put your words here"></textarea><button class="go-btn" onclick="translate()" id="goBtn">
  Dịch - Translate
</button>
    <div class="word-count" id="wc">0 ký tự</div>
  </div>


  <div class="error-msg" id="errMsg"></div>

  <div class="panel" style="margin-top:1rem; position:relative;">
        <div class="result-box empty" id="result">Kết quả - Result</div>
    <button class="copy-btn" id="copyBtn" onclick="copyResult()">Sao chép</button>
  </div>

  <p class="footer-note" style="margin-top:2rem; opacity:0.5; font-size:10px; font-style:italic; text-transform:none; letter-spacing:0.05em;">Nami — Namese</p>

</div>

<script>
const SYSTEM_PROMPTS = {
  'en-vi': `Mày là chuyên gia dịch thuật giọng Nam Kì chính gốc Sài Gòn. Nhiệm vụ của mày là dịch văn bản tiếng Anh sang tiếng Việt theo đúng ngôn phong Nam Kì, không theo chuẩn Hà Nội hay ngôn ngữ viết chuẩn hóa.

Quy tắc bắt buộc:
- Dùng "ba/má" thay vì "bố/mẹ"
- Dùng "ổng/bả/tụi nó" thay vì "ông ấy/bà ấy/họ"
- Dùng "tui/mày" thay vì "tôi/bạn" (khi phù hợp)
- Dùng "giỏ" thay vì "túi" (khi chỉ vật đựng đồ)
- Dùng "dĩa" thay vì "đĩa"
- Dùng "bóp" thay vì "ví"
- Dùng "chút" thay vì "ít" (một chút, chút xíu)
- Dùng "lắm/thiệt/nghen/đó/vậy" đúng chỗ
- Dùng "hổng/hổng có" thay vì "không/không có"
- Dùng "mần" thay vì "làm" (khi phù hợp)
- Câu ngắn, tự nhiên như nói chuyện ngoài quán
- Không dùng "anh ấy/chị ấy" — thay bằng "ổng/bả/cổ"
- Không dùng "rất" — thay bằng "thiệt/lắm"
- Giữ hồn Nam Kì, đừng Bắc hóa bất kỳ từ nào

Chỉ trả về bản dịch, không giải thích gì thêm.`,

  'bac-nam': `Mày là chuyên gia chuyển đổi ngôn phong từ tiếng Việt giọng Bắc/chuẩn sang giọng Nam Kì chính gốc Sài Gòn.

Quy tắc bắt buộc:
- Dùng "ba/má" thay "bố/mẹ"
- Dùng "ổng/bả/cổ" thay "anh ấy/bà ấy/cô ấy"
- Dùng "tui/mày/tụi" thay "tôi/bạn/họ"
- Dùng "giỏ" thay "túi"
- Dùng "dĩa" thay "đĩa"
- Dùng "bóp" thay "ví"
- Dùng "chút/chút xíu" thay "ít/một ít"
- Dùng "hổng/hổng có" thay "không/không có"
- Dùng "mần" thay "làm" (khi phù hợp)
- Dùng "nghen/đó/vậy/nha" đúng chỗ
- Dùng "lắm/thiệt" thay "rất/quá"
- Dùng "coi" thay "xem" (coi phim, coi thử)
- Dùng "dzậy" thay "vậy" (khi nói khẩu ngữ)
- Câu ngắn, nhịp Nam Bộ

Chỉ trả về bản chuyển đổi, không giải thích.`,

  'script': `Mày là chuyên gia soạn script YouTube theo phong cách Nam Kì chính gốc Sài Gòn. Người dùng đưa chủ đề, mày soạn script hoàn chỉnh.

Cấu trúc script:
[HOOK - 0:00-0:08] Câu kéo người xem ở lại, thật tự nhiên
[THÂN BÀI] Chia 3-4 điểm chính, mỗi điểm vài câu
[CHỐT] Kêu gọi subscribe kiểu Nam Kì, thân thiết

Ngôn phong bắt buộc:
- "tui/mày/tụi mình" — không dùng "tôi/bạn"
- "thiệt/lắm/nghen/đó/nha" đúng chỗ
- "hổng" thay "không"
- Câu ngắn, nhịp nói chuyện, không đọc như tin tức
- Thêm tiếng lóng Sài Gòn tự nhiên
- Mở đầu không được dùng "Chào mừng các bạn đến với kênh"

Chỉ trả về script, không giải thích.`
};

let currentMode = 'en-vi';

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const placeholders = {
      'en-vi': 'Dán văn bản tiếng Anh vào đây...',
      'bac-nam': 'Dán văn bản giọng Bắc vào đây...',
      'script': 'Nhập chủ đề YouTube của anh vào đây... (ví dụ: "3 mẹo kiếm tiền ở Sài Gòn không cần vốn")'
    };
    document.getElementById('input').placeholder = placeholders[currentMode];
  });
});

document.getElementById('input').addEventListener('input', function() {
  document.getElementById('wc').textContent = this.value.length + ' ký tự';
});

async function translate() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;

  const btn = document.getElementById('goBtn');
  const result = document.getElementById('result');
  const errMsg = document.getElementById('errMsg');
  const copyBtn = document.getElementById('copyBtn');

  // Khởi động hiệu ứng chờ cho nó chuyên nghiệp
  btn.disabled = true;
  result.textContent = 'Đang mần, đợi xíu nghen...';
  result.classList.add('empty');
  errMsg.style.display = 'none';
  copyBtn.classList.remove('show');

  const userMsg = currentMode === 'script'
    ? `Soạn script YouTube Nam Kì về chủ đề: "${input}"`
    : input;

  try {
    const response = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          role: "user",
          parts: [{ text: SYSTEM_PROMPTS[currentMode] + "\n\n" + userMsg }]
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    // Lấy kết quả đổ ra ô Result
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Hổng thấy hồi âm gì hết trơn!';
    result.textContent = text;
    result.classList.remove('empty');
    copyBtn.classList.add('show');

  } catch (err) {
    // Báo lỗi kiểu Nam Kì luôn
    errMsg.textContent = 'Trời đất ơi, lỗi rồi anh: ' + err.message;
    errMsg.style.display = 'block';
  } finally {
    // Xong xuôi thì nhả cái nút ra
    btn.disabled = false;
  }
}

function copyResult() {
  const text = document.getElementById('result').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Đã chép!';
    setTimeout(() => btn.textContent = 'Sao chép', 1500);
  });
}

document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') translate();
});
</script>
</body>
</html>
